name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[build,mcp]"

      - name: Build executable (Linux / macOS)
        if: matrix.platform != 'windows'
        run: |
          pyinstaller --onefile --console --name engra \
            --collect-all chromadb \
            --collect-all fastembed \
            src/engra/main.py
          mv dist/engra "dist/engra-${{ github.ref_name }}-${{ matrix.platform }}"

      - name: Build executable (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --onefile --console --name engra `
            --collect-all chromadb `
            --collect-all fastembed `
            src/engra/main.py
          mv dist/engra.exe "dist/engra-${{ github.ref_name }}-windows.exe"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: engra_${{ github.ref_name }}_${{ matrix.os }}
          path: dist/engra-${{ github.ref_name }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
